name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.mcp.json.example'
      - '.github/workflows/ci.yml'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: v${VERSION}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE="cc_matrix_channel-${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/cc_matrix_channel" "${ARCHIVE}/"
          cp README.md LICENSE "${ARCHIVE}/"
          cp -r .claude-plugin "${ARCHIVE}/"
          cp -r skills "${ARCHIVE}/"
          cp -r scripts "${ARCHIVE}/"
          cp package.json "${ARCHIVE}/"
          cp .mcp.json "${ARCHIVE}/"
          cp .mcp.json.example "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ needs.create-release.outputs.version }}"
          $Archive = "cc_matrix_channel-${Version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $Archive
          Copy-Item "target\${{ matrix.target }}\release\cc_matrix_channel.exe" "$Archive\"
          Copy-Item "README.md", "LICENSE" "$Archive\"
          Copy-Item -Recurse ".claude-plugin" "$Archive\"
          Copy-Item -Recurse "skills" "$Archive\"
          Copy-Item -Recurse "scripts" "$Archive\"
          Copy-Item "package.json" "$Archive\"
          Copy-Item ".mcp.json" "$Archive\"
          Copy-Item ".mcp.json.example" "$Archive\"
          Compress-Archive -Path "$Archive" -DestinationPath "$Archive.zip"
          $Hash = (Get-FileHash "$Archive.zip" -Algorithm SHA256).Hash
          "${Hash}  ${Archive}.zip" | Out-File -Encoding ascii "$Archive.zip.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          draft: true
          files: |
            cc_matrix_channel-*.tar.gz
            cc_matrix_channel-*.tar.gz.sha256
            cc_matrix_channel-*.zip
            cc_matrix_channel-*.zip.sha256
